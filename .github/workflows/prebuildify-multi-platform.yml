name: Build Multi-Platform Prebuilds

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build-prebuilds:
    runs-on: ${{ matrix.os }}
    timeout-minutes: 120
    strategy:
      matrix:
        include:
          # Windows
          - os: windows-latest
            platform: win32
            arch: x64

          # macOS Intel
          - os: macos-latest
            platform: darwin
            arch: x64

          # macOS ARM64
          - os: macos-latest
            platform: darwin
            arch: arm64

          # Linux x64
          - os: ubuntu-latest
            platform: linux
            arch: x64

          # Linux ARM64
          - os: ubuntu-latest
            platform: linux
            arch: arm64

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Setup MSYS2 (Windows) - Attempt 1
        if: runner.os == 'Windows'
        uses: msys2/setup-msys2@v2
        with:
          msystem: UCRT64
          update: true
          cache: true
          install: >-
            make
            pkg-config
            autoconf
            automake
            libtool
            gcc
            g++
        continue-on-error: true

      - name: Setup MSYS2 (Windows) - Attempt 2
        if: runner.os == 'Windows' && steps['Setup MSYS2 (Windows) - Attempt 1'].outcome == 'failure'
        uses: msys2/setup-msys2@v2
        with:
          msystem: UCRT64
          update: false
          cache: false
          install: >-
            make
            pkg-config
            autoconf
            automake
            libtool
            gcc
            g++
        continue-on-error: true

      - name: Setup MSYS2 (Windows) - Attempt 3
        if: runner.os == 'Windows' && steps['Setup MSYS2 (Windows) - Attempt 2'].outcome == 'failure'
        uses: msys2/setup-msys2@v2
        with:
          msystem: UCRT64
          update: false
          cache: false
          install: >-
            make
            pkg-config
            autoconf
            automake
            libtool
            gcc
            g++

      - name: Verify MSYS2 installation
        if: runner.os == 'Windows'
        run: |
          echo "Verifying MSYS2 installation..."
          if msys2 -c 'echo "MSYS2 is working"' && msys2 -c 'gcc --version' && msys2 -c 'make --version'; then
            echo "✅ MSYS2 installation verified"
          else
            echo "❌ MSYS2 installation failed, but continuing with available tools"
            # 检查是否有其他可用的构建工具
            where gcc 2>nul || echo "GCC not found in PATH"
            where make 2>nul || echo "Make not found in PATH"
            where cl 2>nul || echo "MSVC not found in PATH"
          fi

      - name: Install build tools (macOS/Linux)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          if [ "$RUNNER_OS" = "macOS" ]; then
            # macOS: 安装 autotools 和 pkg-config
            brew install autoconf automake libtool pkg-config
            # 确保 pkg-config 在 PATH 中
            export PATH="/opt/homebrew/bin:/usr/local/bin:$PATH"
            # 验证安装
            which pkg-config || echo "pkg-config not found in PATH"
            pkg-config --version || echo "pkg-config version check failed"
            # 如果还是找不到，尝试直接使用完整路径
            if ! command -v pkg-config &> /dev/null; then
              echo "pkg-config not found, trying alternative locations..."
              find /opt/homebrew -name "pkg-config" 2>/dev/null || echo "pkg-config not found in /opt/homebrew"
              find /usr/local -name "pkg-config" 2>/dev/null || echo "pkg-config not found in /usr/local"
            fi
          else
            # Linux: 安装 autotools 和 pkg-config
            sudo apt-get update
            sudo apt-get install -y autoconf automake libtool build-essential pkg-config
          fi

      - name: Download dependencies
        run: |
          # 重试机制处理网络问题
          for i in {1..3}; do
            echo "Attempt $i: Downloading dependencies..."
            if bash scripts/download-dependencies.sh; then
              echo "Dependencies downloaded successfully"
              break
            else
              if [ $i -lt 3 ]; then
                echo "Download failed, retrying in 10 seconds..."
                sleep 10
              else
                echo "Download failed after 3 attempts"
                exit 1
              fi
            fi
          done

          # 验证下载的文件
          if [ ! -d "deps/LibRaw-Source/LibRaw-0.21.4" ]; then
            echo "❌ LibRaw source directory not found after download"
            exit 1
          fi
          echo "✅ LibRaw source verified"

      - name: Verify build environment
        run: |
          echo "🔍 Verifying build environment..."
          echo "Platform: ${{ matrix.platform }}"
          echo "Architecture: ${{ matrix.arch }}"
          echo "Runner OS: ${{ runner.os }}"

          # 验证必要的工具
          if [ "${{ runner.os }}" = "Windows" ]; then
            echo "Windows build environment:"
            msys2 -c 'gcc --version' || echo "❌ GCC not found"
            msys2 -c 'make --version' || echo "❌ Make not found"
            msys2 -c 'autoconf --version' || echo "❌ Autoconf not found"
          else
            echo "Unix build environment:"
            gcc --version || echo "❌ GCC not found"
            make --version || echo "❌ Make not found"
            autoconf --version || echo "❌ Autoconf not found"
            pkg-config --version || echo "❌ pkg-config not found"
          fi
          echo "✅ Build environment verification completed"

      - name: Setup Visual Studio Build Tools (Windows)
        if: runner.os == 'Windows'
        uses: microsoft/setup-msbuild@v1.3
        with:
          version: "latest"

      - name: Build LibRaw (Windows - MSYS2)
        if: runner.os == 'Windows'
        shell: msys2 {0}
        run: |
          # Windows 平台构建
          PLATFORM="windows"
          ARCH="${{ matrix.arch }}"
          JOBS=4

          echo "Building LibRaw for Windows ${ARCH}..."

          # 构建 LibRaw (禁用 lcms2 和 OpenMP)
          cd deps/LibRaw-Source/LibRaw-0.21.4

          # 检查 configure 脚本是否存在
          if [ ! -f "./configure" ]; then
            echo "Generating configure script..."
            autoreconf --install
          else
            echo "Using pre-generated configure script"
          fi

          # 设置编译选项，确保使用 -fPIC
          export CFLAGS="-fPIC"
          export CXXFLAGS="-fPIC"

          # Windows 构建配置
          echo "Configuring LibRaw build..."
          if ! ./configure --enable-static --disable-shared --disable-openmp --disable-examples --disable-lcms --disable-jasper --disable-jpeg --prefix="$(pwd)/build/${PLATFORM}-${ARCH}"; then
            echo "❌ Configure failed"
            exit 1
          fi

          echo "Building LibRaw..."
          if ! make -j${JOBS}; then
            echo "❌ Make failed"
            exit 1
          fi

          echo "Installing LibRaw..."
          if ! make install; then
            echo "❌ Make install failed"
            exit 1
          fi

          # 验证安装
          if [ ! -d "build/${PLATFORM}-${ARCH}/lib" ]; then
            echo "❌ LibRaw installation verification failed"
            exit 1
          fi
          echo "✅ LibRaw build completed successfully"

      - name: Build LibRaw (Windows - Fallback)
        if: runner.os == 'Windows'
        run: |
          # 备用 Windows 构建方法（使用 MSVC）
          echo "Attempting fallback Windows build with MSVC..."

          PLATFORM="windows"
          ARCH="${{ matrix.arch }}"

          # 设置 MSVC 环境
          call "C:\Program Files (x86)\Microsoft Visual Studio\2019\Enterprise\VC\Auxiliary\Build\vcvars64.bat" 2>nul || call "C:\Program Files (x86)\Microsoft Visual Studio\2019\Professional\VC\Auxiliary\Build\vcvars64.bat" 2>nul || call "C:\Program Files (x86)\Microsoft Visual Studio\2019\Community\VC\Auxiliary\Build\vcvars64.bat" 2>nul || echo "MSVC not found"

          cd deps\LibRaw-Source\LibRaw-0.21.4

          # 使用 MSVC 构建
          if exist "build\${PLATFORM}-${ARCH}\lib" (
            echo "LibRaw already built with MSYS2"
          ) else (
            echo "Building LibRaw with MSVC fallback..."
            # 这里可以添加 MSVC 特定的构建命令
            echo "MSVC build not implemented yet, using MSYS2 result"
          )

      - name: Build LibRaw (macOS/Linux)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          # 设置平台和架构变量
          if [ "$RUNNER_OS" = "macOS" ]; then
            PLATFORM="darwin"
            ARCH="${{ matrix.arch }}"
            JOBS=$(sysctl -n hw.ncpu)
          else
            PLATFORM="linux"
            ARCH="${{ matrix.arch }}"
            JOBS=$(nproc)
          fi

          echo "Building LibRaw for ${PLATFORM} ${ARCH}..."

          # 构建 LibRaw (禁用 lcms2 和 OpenMP)
          cd deps/LibRaw-Source/LibRaw-0.21.4

          # 检查 configure 脚本是否存在
          if [ ! -f "./configure" ]; then
            echo "Generating configure script..."
            autoreconf --install
          else
            echo "Using pre-generated configure script"
          fi

          # 设置编译选项，确保使用 -fPIC
          export CFLAGS="-fPIC"
          export CXXFLAGS="-fPIC"

          # Unix 构建配置
          echo "Configuring LibRaw build..."
          if ! ./configure --enable-static --disable-shared --disable-openmp --disable-examples --disable-lcms --disable-jasper --disable-jpeg --prefix="$(pwd)/build/${PLATFORM}-${ARCH}"; then
            echo "❌ Configure failed"
            exit 1
          fi

          echo "Building LibRaw..."
          if ! make -j${JOBS}; then
            echo "❌ Make failed"
            exit 1
          fi

          echo "Installing LibRaw..."
          if ! make install; then
            echo "❌ Make install failed"
            exit 1
          fi

          # 验证安装
          if [ ! -d "build/${PLATFORM}-${ARCH}/lib" ]; then
            echo "❌ LibRaw installation verification failed"
            exit 1
          fi
          echo "✅ LibRaw build completed successfully"

      - name: Install dependencies
        run: npm ci

      - name: Build prebuildify
        run: |
          echo "Building prebuildify for ${{ matrix.platform }}-${{ matrix.arch }}..."

          # 设置环境变量
          export npm_config_arch="${{ matrix.arch }}"
          export npm_config_platform="${{ matrix.platform }}"

          # 构建 prebuildify
          if ! npm run prebuildify; then
            echo "❌ Prebuildify build failed"
            exit 1
          fi

          # 验证构建结果
          if [ ! -d "prebuilds" ]; then
            echo "❌ Prebuilds directory not found"
            exit 1
          fi

          # 列出构建的文件
          echo "✅ Prebuildify completed successfully"
          find prebuilds -name "*.node" -type f | head -10
        env:
          npm_config_arch: ${{ matrix.arch }}
          npm_config_platform: ${{ matrix.platform }}

      - name: Upload prebuilds
        uses: actions/upload-artifact@v4
        with:
          name: prebuilds-${{ matrix.platform }}-${{ matrix.arch }}
          path: prebuilds/
          retention-days: 30

  merge-prebuilds:
    runs-on: ubuntu-latest
    needs: build-prebuilds
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Download all prebuilds
        uses: actions/download-artifact@v4
        with:
          path: prebuilds-temp/

      - name: Merge prebuilds
        run: |
          mkdir -p prebuilds
          # 合并所有平台的预构建文件
          for dir in prebuilds-temp/*/; do
            if [ -d "$dir" ]; then
              cp -r "$dir"/* prebuilds/ 2>/dev/null || true
            fi
          done

          # 显示合并后的文件结构
          find prebuilds -name "*.node" -type f

      - name: Commit and push prebuilds
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add prebuilds/
          git commit -m "Add prebuilds for all platforms" || exit 0
          git push

  publish:
    runs-on: ubuntu-latest
    needs: merge-prebuilds
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"

      - name: Install dependencies
        run: npm ci

      - name: Publish to npm
        run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
