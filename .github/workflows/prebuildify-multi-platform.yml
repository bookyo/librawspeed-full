name: Build Multi-Platform Prebuilds

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build-prebuilds:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          # Windows
          - os: windows-latest
            platform: win32
            arch: x64

          # macOS Intel
          - os: macos-latest
            platform: darwin
            arch: x64

          # macOS ARM64
          - os: macos-latest
            platform: darwin
            arch: arm64

          # Linux x64
          - os: ubuntu-latest
            platform: linux
            arch: x64

          # Linux ARM64
          - os: ubuntu-latest
            platform: linux
            arch: arm64

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Download dependencies
        run: |
          bash scripts/download-dependencies.sh

      - name: Build dependencies
        shell: bash
        run: |
          # 设置平台和架构变量
          if [ "$RUNNER_OS" = "Windows" ]; then
            PLATFORM="windows"
            ARCH="x64"
            JOBS=4
          elif [ "$RUNNER_OS" = "macOS" ]; then
            PLATFORM="darwin"
            ARCH="arm64"
            JOBS=$(sysctl -n hw.ncpu)
          else
            PLATFORM="linux"
            ARCH="x64"
            JOBS=$(nproc)
          fi

          # 构建 lcms2
          cd deps/lcms2-source/lcms2-2.17
          ./configure --enable-static --disable-shared --prefix="$(pwd)/../build/${PLATFORM}-${ARCH}"
          make -j${JOBS}
          make install

          # 构建 LibRaw (使用 autotools)
          cd ../../LibRaw-Source/LibRaw-0.21.4
          ./configure --enable-static --disable-shared --disable-openmp --prefix="$(pwd)/build/${PLATFORM}-${ARCH}"
          make -j${JOBS}
          make install

      - name: Install dependencies
        run: npm ci

      - name: Build prebuildify
        run: npm run prebuildify
        env:
          npm_config_arch: ${{ matrix.arch }}
          npm_config_platform: ${{ matrix.platform }}

      - name: Upload prebuilds
        uses: actions/upload-artifact@v4
        with:
          name: prebuilds-${{ matrix.platform }}-${{ matrix.arch }}
          path: prebuilds/
          retention-days: 30

  merge-prebuilds:
    runs-on: ubuntu-latest
    needs: build-prebuilds
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download all prebuilds
        uses: actions/download-artifact@v4
        with:
          path: prebuilds-temp/

      - name: Merge prebuilds
        run: |
          mkdir -p prebuilds
          # 合并所有平台的预构建文件
          for dir in prebuilds-temp/*/; do
            if [ -d "$dir" ]; then
              cp -r "$dir"/* prebuilds/ 2>/dev/null || true
            fi
          done

          # 显示合并后的文件结构
          find prebuilds -name "*.node" -type f

      - name: Commit and push prebuilds
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add prebuilds/
          git commit -m "Add prebuilds for all platforms" || exit 0
          git push

  publish:
    runs-on: ubuntu-latest
    needs: merge-prebuilds
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"

      - name: Install dependencies
        run: npm ci

      - name: Publish to npm
        run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
