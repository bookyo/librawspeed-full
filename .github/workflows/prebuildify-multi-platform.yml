name: Build Multi-Platform Prebuilds

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build-prebuilds:
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60
    strategy:
      matrix:
        include:
          # Windows
          - os: windows-latest
            platform: win32
            arch: x64

          # macOS Intel
          - os: macos-latest
            platform: darwin
            arch: x64

          # macOS ARM64
          - os: macos-latest
            platform: darwin
            arch: arm64

          # Linux x64
          - os: ubuntu-latest
            platform: linux
            arch: x64

          # Linux ARM64
          - os: ubuntu-latest
            platform: linux
            arch: arm64

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install build tools
        shell: bash
        run: |
          if [ "$RUNNER_OS" = "Windows" ]; then
            # Windows: 使用更稳定的方法
            echo "Installing Windows build tools..."
            # 尝试安装 MSYS2，如果失败则跳过 Windows 构建
            choco install msys2 --timeout 2400 --retry-count 2 -y || {
              echo "MSYS2 installation failed, skipping Windows build"
              echo "SKIP_WINDOWS_BUILD=true" >> $GITHUB_ENV
              exit 0
            }
            # 等待安装完成
            sleep 20
            # 检查 MSYS2 是否安装成功
            if [ -d "/c/tools/msys64" ]; then
              echo "MSYS2 installed successfully"
              # 设置 PATH
              export PATH="/c/tools/msys64/usr/bin:$PATH"
              # 更新包数据库（设置超时）
              timeout 600 /c/tools/msys64/usr/bin/pacman -Sy --noconfirm || echo "Package update timeout, continuing..."
              # 安装基本工具
              timeout 600 /c/tools/msys64/usr/bin/pacman -S --noconfirm make pkg-config || echo "Tool installation timeout, continuing..."
            else
              echo "MSYS2 installation failed, skipping Windows build"
              echo "SKIP_WINDOWS_BUILD=true" >> $GITHUB_ENV
            fi
          elif [ "$RUNNER_OS" = "macOS" ]; then
            # macOS: 安装 autotools 和 pkg-config
            brew install autoconf automake libtool pkg-config
            # 确保 pkg-config 在 PATH 中
            export PATH="/opt/homebrew/bin:/usr/local/bin:$PATH"
            # 验证安装
            which pkg-config || echo "pkg-config not found in PATH"
            pkg-config --version || echo "pkg-config version check failed"
            # 如果还是找不到，尝试直接使用完整路径
            if ! command -v pkg-config &> /dev/null; then
              echo "pkg-config not found, trying alternative locations..."
              find /opt/homebrew -name "pkg-config" 2>/dev/null || echo "pkg-config not found in /opt/homebrew"
              find /usr/local -name "pkg-config" 2>/dev/null || echo "pkg-config not found in /usr/local"
            fi
          else
            # Linux: 安装 autotools 和 pkg-config
            sudo apt-get update
            sudo apt-get install -y autoconf automake libtool build-essential pkg-config
          fi

      - name: Download dependencies
        run: |
          bash scripts/download-dependencies.sh

      - name: Build LibRaw (no lcms2)
        shell: bash
        run: |
          # 检查是否跳过 Windows 构建
          if [ "$SKIP_WINDOWS_BUILD" = "true" ] && [ "$RUNNER_OS" = "Windows" ]; then
            echo "Skipping Windows build due to MSYS2 installation failure"
            exit 0
          fi

          # 设置平台和架构变量
          if [ "$RUNNER_OS" = "Windows" ]; then
            PLATFORM="windows"
            ARCH="x64"
            JOBS=4
            # 设置 Windows 环境 PATH
            export PATH="/c/tools/msys64/usr/bin:$PATH"
            # 验证工具可用性
            echo "Checking Windows build environment..."
            which make || echo "make not found"
            which pkg-config || echo "pkg-config not found"
          elif [ "$RUNNER_OS" = "macOS" ]; then
            PLATFORM="darwin"
            ARCH="arm64"
            JOBS=$(sysctl -n hw.ncpu)
          else
            PLATFORM="linux"
            ARCH="x64"
            JOBS=$(nproc)
          fi

          # 构建 LibRaw (禁用 lcms2 和 OpenMP)
          cd deps/LibRaw-Source/LibRaw-0.21.4

          # 检查 configure 脚本是否存在
          if [ ! -f "./configure" ]; then
            echo "Generating configure script..."
            if [ "$RUNNER_OS" = "Windows" ]; then
              # Windows: 尝试使用 autoreconf，如果失败则使用预生成的脚本
              /c/tools/msys64/usr/bin/autoreconf --install || {
                echo "autoreconf failed, checking for pre-generated configure..."
                if [ ! -f "./configure" ]; then
                  echo "No configure script available, build failed"
                  exit 1
                fi
              }
            else
              autoreconf --install
            fi
          else
            echo "Using pre-generated configure script"
          fi

          # 设置编译选项，确保使用 -fPIC
          export CFLAGS="-fPIC"
          export CXXFLAGS="-fPIC"
          # 简单构建，禁用所有可选依赖
          ./configure --enable-static --disable-shared --disable-openmp --disable-examples --disable-lcms --disable-jasper --disable-jpeg --prefix="$(pwd)/build/${PLATFORM}-${ARCH}"
          make -j${JOBS}
          make install

      - name: Install dependencies
        run: npm ci

      - name: Build prebuildify
        run: |
          if [ "$SKIP_WINDOWS_BUILD" = "true" ] && [ "$RUNNER_OS" = "Windows" ]; then
            echo "Skipping prebuildify for Windows due to MSYS2 installation failure"
            exit 0
          fi
          npm run prebuildify
        env:
          npm_config_arch: ${{ matrix.arch }}
          npm_config_platform: ${{ matrix.platform }}

      - name: Upload prebuilds
        if: env.SKIP_WINDOWS_BUILD != 'true' || runner.os != 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: prebuilds-${{ matrix.platform }}-${{ matrix.arch }}
          path: prebuilds/
          retention-days: 30

  merge-prebuilds:
    runs-on: ubuntu-latest
    needs: build-prebuilds
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download all prebuilds
        uses: actions/download-artifact@v4
        with:
          path: prebuilds-temp/

      - name: Merge prebuilds
        run: |
          mkdir -p prebuilds
          # 合并所有平台的预构建文件
          for dir in prebuilds-temp/*/; do
            if [ -d "$dir" ]; then
              cp -r "$dir"/* prebuilds/ 2>/dev/null || true
            fi
          done

          # 显示合并后的文件结构
          find prebuilds -name "*.node" -type f

      - name: Commit and push prebuilds
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add prebuilds/
          git commit -m "Add prebuilds for all platforms" || exit 0
          git push

  publish:
    runs-on: ubuntu-latest
    needs: merge-prebuilds
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"

      - name: Install dependencies
        run: npm ci

      - name: Publish to npm
        run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
