name: Build Multi-Platform Prebuilds

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build-prebuilds:
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60
    strategy:
      matrix:
        include:
          # Windows
          - os: windows-latest
            platform: win32
            arch: x64

          # macOS Intel
          - os: macos-latest
            platform: darwin
            arch: x64

          # macOS ARM64
          - os: macos-latest
            platform: darwin
            arch: arm64

          # Linux x64
          - os: ubuntu-latest
            platform: linux
            arch: x64

          # Linux ARM64
          - os: ubuntu-latest
            platform: linux
            arch: arm64

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install build tools
        run: |
          if [ "$RUNNER_OS" = "Windows" ]; then
            # Windows: 安装 autotools 和 pkg-config
            choco install autoconf automake libtool make pkg-config -y
          elif [ "$RUNNER_OS" = "macOS" ]; then
            # macOS: 安装 autotools 和 pkg-config
            brew install autoconf automake libtool pkg-config
          else
            # Linux: 安装 autotools 和 pkg-config
            sudo apt-get update
            sudo apt-get install -y autoconf automake libtool build-essential pkg-config
          fi

      - name: Download dependencies
        run: |
          bash scripts/download-dependencies.sh

      - name: Build dependencies
        shell: bash
        run: |
          # 设置平台和架构变量
          if [ "$RUNNER_OS" = "Windows" ]; then
            PLATFORM="windows"
            ARCH="x64"
            JOBS=4
          elif [ "$RUNNER_OS" = "macOS" ]; then
            PLATFORM="darwin"
            ARCH="arm64"
            JOBS=$(sysctl -n hw.ncpu)
          else
            PLATFORM="linux"
            ARCH="x64"
            JOBS=$(nproc)
          fi

          # 构建 lcms2
          cd deps/lcms2-source/lcms2-2.17
          ./configure --enable-static --disable-shared --prefix="$(pwd)/../build/${PLATFORM}-${ARCH}" --disable-utils
          make -j${JOBS}
          make install

          # 构建 LibRaw (使用 autotools)
          cd ../../LibRaw-Source/LibRaw-0.21.4
          # 生成 configure 脚本 (官方文档要求)
          autoreconf --install
          # 完全禁用系统 lcms2，强制使用我们构建的版本
          export PKG_CONFIG_PATH="$(pwd)/../lcms2-source/build/${PLATFORM}-${ARCH}/lib/pkgconfig"
          export CPPFLAGS="-I$(pwd)/../lcms2-source/build/${PLATFORM}-${ARCH}/include"
          export LDFLAGS="-L$(pwd)/../lcms2-source/build/${PLATFORM}-${ARCH}/lib"
          export LCMS2_CFLAGS="-I$(pwd)/../lcms2-source/build/${PLATFORM}-${ARCH}/include"
          export LCMS2_LIBS="-L$(pwd)/../lcms2-source/build/${PLATFORM}-${ARCH}/lib -lcms2"
          # 移除系统路径，避免找到系统 lcms2
          export PATH="$(pwd)/../lcms2-source/build/${PLATFORM}-${ARCH}/bin:$(echo $PATH | sed 's|/opt/homebrew/bin:||g' | sed 's|/usr/local/bin:||g')"
          # 验证 pkg-config 能找到我们的 lcms2
          pkg-config --exists lcms2 || echo "Warning: lcms2 not found by pkg-config"
          pkg-config --cflags --libs lcms2 || echo "Warning: lcms2 pkg-config failed"
          ./configure --enable-static --disable-shared --disable-openmp --disable-examples --prefix="$(pwd)/build/${PLATFORM}-${ARCH}" --with-lcms2="$(pwd)/../lcms2-source/build/${PLATFORM}-${ARCH}"
          make -j${JOBS}
          make install

      - name: Install dependencies
        run: npm ci

      - name: Build prebuildify
        run: npm run prebuildify
        env:
          npm_config_arch: ${{ matrix.arch }}
          npm_config_platform: ${{ matrix.platform }}

      - name: Upload prebuilds
        uses: actions/upload-artifact@v4
        with:
          name: prebuilds-${{ matrix.platform }}-${{ matrix.arch }}
          path: prebuilds/
          retention-days: 30

  merge-prebuilds:
    runs-on: ubuntu-latest
    needs: build-prebuilds
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download all prebuilds
        uses: actions/download-artifact@v4
        with:
          path: prebuilds-temp/

      - name: Merge prebuilds
        run: |
          mkdir -p prebuilds
          # 合并所有平台的预构建文件
          for dir in prebuilds-temp/*/; do
            if [ -d "$dir" ]; then
              cp -r "$dir"/* prebuilds/ 2>/dev/null || true
            fi
          done

          # 显示合并后的文件结构
          find prebuilds -name "*.node" -type f

      - name: Commit and push prebuilds
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add prebuilds/
          git commit -m "Add prebuilds for all platforms" || exit 0
          git push

  publish:
    runs-on: ubuntu-latest
    needs: merge-prebuilds
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"

      - name: Install dependencies
        run: npm ci

      - name: Publish to npm
        run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
