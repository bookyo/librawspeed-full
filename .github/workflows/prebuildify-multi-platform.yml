name: Build Multi-Platform Prebuilds

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build-prebuilds:
    runs-on: ${{ matrix.os }}
    timeout-minutes: 90
    strategy:
      matrix:
        include:
          # Windows
          - os: windows-latest
            platform: win32
            arch: x64

          # macOS Intel
          - os: macos-latest
            platform: darwin
            arch: x64

          # macOS ARM64
          - os: macos-latest
            platform: darwin
            arch: arm64

          # Linux x64
          - os: ubuntu-latest
            platform: linux
            arch: x64

          # Linux ARM64
          - os: ubuntu-latest
            platform: linux
            arch: arm64

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          timeout-minutes: 15

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Setup MSYS2 (Windows)
        if: runner.os == 'Windows'
        uses: msys2/setup-msys2@v2
        with:
          msystem: UCRT64
          update: true
          install: >-
            make
            pkg-config
            autoconf
            automake
            libtool

      - name: Install build tools (macOS/Linux)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          if [ "$RUNNER_OS" = "macOS" ]; then
            # macOS: 安装 autotools 和 pkg-config
            brew install autoconf automake libtool pkg-config
            # 确保 pkg-config 在 PATH 中
            export PATH="/opt/homebrew/bin:/usr/local/bin:$PATH"
            # 验证安装
            which pkg-config || echo "pkg-config not found in PATH"
            pkg-config --version || echo "pkg-config version check failed"
            # 如果还是找不到，尝试直接使用完整路径
            if ! command -v pkg-config &> /dev/null; then
              echo "pkg-config not found, trying alternative locations..."
              find /opt/homebrew -name "pkg-config" 2>/dev/null || echo "pkg-config not found in /opt/homebrew"
              find /usr/local -name "pkg-config" 2>/dev/null || echo "pkg-config not found in /usr/local"
            fi
          else
            # Linux: 安装 autotools 和 pkg-config
            sudo apt-get update
            sudo apt-get install -y autoconf automake libtool build-essential pkg-config
          fi

      - name: Download dependencies
        run: |
          # 重试机制处理网络问题
          for i in {1..3}; do
            echo "Attempt $i: Downloading dependencies..."
            bash scripts/download-dependencies.sh && break
            if [ $i -lt 3 ]; then
              echo "Download failed, retrying in 10 seconds..."
              sleep 10
            else
              echo "Download failed after 3 attempts"
              exit 1
            fi
          done

      - name: Build LibRaw (no lcms2)
        shell: msys2 {0}
        run: |
          # 设置平台和架构变量
          if [ "$RUNNER_OS" = "Windows" ]; then
            PLATFORM="windows"
            ARCH="x64"
            JOBS=4
          elif [ "$RUNNER_OS" = "macOS" ]; then
            PLATFORM="darwin"
            ARCH="arm64"
            JOBS=$(sysctl -n hw.ncpu)
          else
            PLATFORM="linux"
            ARCH="x64"
            JOBS=$(nproc)
          fi

          # 构建 LibRaw (禁用 lcms2 和 OpenMP)
          cd deps/LibRaw-Source/LibRaw-0.21.4

          # 检查 configure 脚本是否存在
          if [ ! -f "./configure" ]; then
            echo "Generating configure script..."
            autoreconf --install
          else
            echo "Using pre-generated configure script"
          fi

          # 设置编译选项，确保使用 -fPIC
          export CFLAGS="-fPIC"
          export CXXFLAGS="-fPIC"
          # 简单构建，禁用所有可选依赖
          ./configure --enable-static --disable-shared --disable-openmp --disable-examples --disable-lcms --disable-jasper --disable-jpeg --prefix="$(pwd)/build/${PLATFORM}-${ARCH}"
          make -j${JOBS}
          make install

      - name: Install dependencies
        run: npm ci

      - name: Build prebuildify
        run: npm run prebuildify
        env:
          npm_config_arch: ${{ matrix.arch }}
          npm_config_platform: ${{ matrix.platform }}

      - name: Upload prebuilds
        uses: actions/upload-artifact@v4
        with:
          name: prebuilds-${{ matrix.platform }}-${{ matrix.arch }}
          path: prebuilds/
          retention-days: 30

  merge-prebuilds:
    runs-on: ubuntu-latest
    needs: build-prebuilds
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          timeout-minutes: 15

      - name: Download all prebuilds
        uses: actions/download-artifact@v4
        with:
          path: prebuilds-temp/

      - name: Merge prebuilds
        run: |
          mkdir -p prebuilds
          # 合并所有平台的预构建文件
          for dir in prebuilds-temp/*/; do
            if [ -d "$dir" ]; then
              cp -r "$dir"/* prebuilds/ 2>/dev/null || true
            fi
          done

          # 显示合并后的文件结构
          find prebuilds -name "*.node" -type f

      - name: Commit and push prebuilds
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add prebuilds/
          git commit -m "Add prebuilds for all platforms" || exit 0
          git push

  publish:
    runs-on: ubuntu-latest
    needs: merge-prebuilds
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          timeout-minutes: 15

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"

      - name: Install dependencies
        run: npm ci

      - name: Publish to npm
        run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
