name: Build Prebuilds for All Platforms

on:
    push:
        tags:
            - "v*"
    workflow_dispatch:

jobs:
    build-prebuilds:
        strategy:
            matrix:
                include:
                    - os: ubuntu-latest
                      platform: linux
                      arch: x64
                      runner: ubuntu-latest
                    - os: ubuntu-latest
                      platform: linux
                      arch: arm64
                      runner: ubuntu-latest
                    - os: macos-latest
                      platform: darwin
                      arch: x64
                      runner: macos-latest
                    - os: macos-latest
                      platform: darwin
                      arch: arm64
                      runner: macos-latest
                    - os: windows-latest
                      platform: win32
                      arch: x64
                      runner: windows-latest

        runs-on: ${{ matrix.runner }}
        timeout-minutes: 30

        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: "22"
                  cache: "npm"

            - name: Install dependencies
              run: npm ci

            - name: Install build tools (Linux)
              if: matrix.platform == 'linux'
              run: |
                  sudo apt-get update
                  sudo apt-get install -y autoconf automake libtool build-essential pkg-config

            - name: Install build tools (macOS)
              if: matrix.platform == 'darwin'
              run: |
                  brew install autoconf automake libtool pkg-config

            - name: Install build tools (Windows)
              if: matrix.platform == 'win32'
              run: |
                  # Windows 预装了 Visual Studio Build Tools
                  echo "Using pre-installed MSVC tools"

            - name: Download LibRaw dependencies
              run: bash scripts/download-dependencies.sh

            - name: Build LibRaw
              run: bash scripts/build-libraw.sh

            - name: Generate prebuild for current platform
              run: npm run prebuildify
              env:
                  # 设置目标平台和架构
                  PREBUILD_PLATFORM: ${{ matrix.platform }}
                  PREBUILD_ARCH: ${{ matrix.arch }}

            - name: Upload prebuild artifact
              uses: actions/upload-artifact@v4
              with:
                  name: prebuild-${{ matrix.platform }}-${{ matrix.arch }}
                  path: prebuilds/
                  retention-days: 30

    collect-prebuilds:
        runs-on: ubuntu-latest
        needs: build-prebuilds
        if: always()

        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Download all prebuild artifacts
              uses: actions/download-artifact@v4
              with:
                  path: prebuilds/

            - name: Merge prebuilds
              run: |
                  echo "🔗 合并所有平台的预构建文件..."

                  # 创建统一的 prebuilds 目录
                  mkdir -p prebuilds-unified

                  # 合并所有平台的预构建文件
                  for dir in prebuilds-*/prebuilds/*; do
                    if [ -d "$dir" ]; then
                      platform_arch=$(basename "$dir")
                      echo "📁 处理平台: $platform_arch"
                      cp -r "$dir" "prebuilds-unified/"
                    fi
                  done

                  # 显示最终结构
                  echo "📊 最终预构建文件结构:"
                  find prebuilds-unified -name "*.node" -type f | sort

                  # 统计信息
                  echo "📈 统计信息:"
                  echo "总文件数: $(find prebuilds-unified -name "*.node" -type f | wc -l)"
                  echo "总大小: $(du -sh prebuilds-unified/ | cut -f1)"

            - name: Upload unified prebuilds
              uses: actions/upload-artifact@v4
              with:
                  name: prebuilds-all-platforms
                  path: prebuilds-unified/
                  retention-days: 30

            - name: Create prebuilds summary
              run: |
                  echo "## 🎯 Prebuilds 构建完成" >> $GITHUB_STEP_SUMMARY
                  echo "" >> $GITHUB_STEP_SUMMARY
                  echo "### 📊 构建统计" >> $GITHUB_STEP_SUMMARY
                  echo "- **总文件数**: $(find prebuilds-unified -name "*.node" -type f | wc -l)" >> $GITHUB_STEP_SUMMARY
                  echo "- **总大小**: $(du -sh prebuilds-unified/ | cut -f1)" >> $GITHUB_STEP_SUMMARY
                  echo "" >> $GITHUB_STEP_SUMMARY
                  echo "### 📁 支持平台" >> $GITHUB_STEP_SUMMARY
                  echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
                  find prebuilds-unified -name "*.node" -type f | sort >> $GITHUB_STEP_SUMMARY
                  echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
