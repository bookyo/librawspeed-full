name: Build and Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write
  id-token: write

jobs:
  build-prebuilds:
    strategy:
      max-parallel: 3 # 控制并发，避免 runner 资源竞争
      fail-fast: false # 不因为一个作业失败而取消其他作业
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux
            arch: x64
            runner: ubuntu-24.04
            runner-type: ubuntu-24.04
            cores: 4
            memory: 16
          - os: macos-13
            platform: darwin
            arch: x64
            runner: macos-13
            runner-type: macos-13
            cores: 4
            memory: 14
          - os: macos-latest
            platform: darwin
            arch: arm64
            runner: macos-latest
            runner-type: macos-14
            cores: 10
            memory: 14
          - os: windows-latest
            platform: win32
            arch: x64
            runner: windows-latest
            runner-type: windows-2022
            cores: 10
            memory: 32

    runs-on: ${{ matrix.runner }}
    timeout-minutes: 120

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Display hardware specifications
        shell: bash
        run: |
          echo "🖥️  固定硬件规格配置:"
          echo "=================="
          echo "操作系统: $(uname -s)"
          echo "架构: $(uname -m)"
          echo "内核版本: $(uname -r)"
          echo "配置类型: 高性能构建环境"
          echo "CPU 核心数: ${{ matrix.cores }} (固定配置)"
          echo "内存大小: ${{ matrix.memory }}GB (固定配置)"
          echo "并行任务数: 8 (为系统保留 2 核心)"
          echo "Runner 类型: ${{ matrix.runner-type }}"
          echo "=================="
          echo "实际系统信息:"
          echo "检测到的 CPU 核心: $(nproc 2>/dev/null || sysctl -n hw.ncpu 2>/dev/null || echo 'N/A')"
          echo "检测到的内存:"
          if command -v free >/dev/null 2>&1; then
            free -h
          elif command -v vm_stat >/dev/null 2>&1; then
            vm_stat
          else
            echo "无法获取内存信息"
          fi
          echo "磁盘空间:"
          df -h
          echo "=================="

      - name: Install build tools (Linux)
        if: matrix.platform == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y autoconf automake libtool build-essential pkg-config

      - name: Install build tools (macOS)
        if: matrix.platform == 'darwin'
        run: |
          echo "🍎 安装 macOS 构建工具..."
          brew install autoconf automake libtool pkg-config
          echo "export PATH=\"/opt/homebrew/opt/libtool/bin:$PATH\"" >> $GITHUB_ENV
          echo "🔍 检查构建工具状态:"
          which autoconf automake libtool pkg-config

      - name: Install build tools (Windows)
        if: matrix.platform == 'win32'
        shell: cmd
        run: |
          echo 🪟 验证 Windows 构建环境...
          call "C:\Program Files\Microsoft Visual Studio\2022\Enterprise\Common7\Tools\VsDevCmd.bat" -arch=amd64 -host_arch=amd64
          echo ✅ 已加载 VS 开发者命令环境
          where cl
          cl /?
          where nmake
          where cmake

      - name: Setup MSVC (Windows)
        if: matrix.platform == 'win32'
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Download LibRaw dependencies
        shell: bash
        run: bash scripts/download-dependencies.sh

      - name: Build LibRaw (Windows)
        if: matrix.platform == 'win32'
        shell: cmd
        run: |
          echo Starting LibRaw MSVC build
          cd deps\LibRaw-Source\LibRaw-0.21.4
          call "C:\Program Files\Microsoft Visual Studio\2022\Enterprise\Common7\Tools\VsDevCmd.bat" -arch=amd64 -host_arch=amd64
          where cl
          where nmake
          if not exist lib mkdir lib
          if not exist object mkdir object
          if not exist bin mkdir bin
          nmake /nologo /f Makefile.msvc clean
          nmake /nologo /f Makefile.msvc lib\libraw_static.lib
          if not exist lib\libraw_static.lib (
            echo libraw_static.lib not found
            exit /b 2
          )
          mkdir build\windows-x64\lib
          copy /y lib\libraw_static.lib build\windows-x64\lib\
          dir build\windows-x64\lib

      - name: Build LibRaw (non-Windows)
        if: matrix.platform != 'win32'
        shell: bash
        run: |
          echo "🚀 开始构建 LibRaw..."
          echo "⏰ 构建开始时间: $(date)"
          echo "📊 构建配置: 动态并行任务，基于实际硬件规格"
          echo "🔄 构建过程可能需要5-10分钟，请耐心等待..."
          bash scripts/build-libraw.sh
          echo "✅ LibRaw 构建完成"
          echo "⏰ 构建结束时间: $(date)"
          echo "📁 检查构建结果..."
          ls -la deps/LibRaw-Source/LibRaw-*/build/*/

      - name: Generate prebuild (Windows)
        if: matrix.platform == 'win32'
        shell: cmd
        run: |
          npx prebuildify --napi --platform win32 --arch x64

      - name: Generate prebuild (macOS)
        if: matrix.platform == 'darwin'
        shell: bash
        run: |
          npx prebuildify --napi --platform darwin --arch ${{ matrix.arch }}

      - name: Generate prebuild (Linux)
        if: matrix.platform == 'linux'
        shell: bash
        run: |
          npx prebuildify --napi --platform linux --arch x64

      - name: Verify prebuild output (POSIX)
        if: matrix.platform != 'win32'
        shell: bash
        run: |
          echo "Verifying POSIX prebuild exists"
          ls -la prebuilds || true
          PREBUILD_PATH="prebuilds/${{ matrix.platform }}-${{ matrix.arch }}/librawspeed-full.node"
          if [ ! -f "$PREBUILD_PATH" ]; then
            echo "Missing prebuild at $PREBUILD_PATH" >&2
            exit 2
          fi

      - name: Verify prebuild output
        if: matrix.platform == 'win32'
        shell: cmd
        run: |
          echo Verifying Windows prebuild exists
          dir prebuilds\
          if not exist prebuilds\win32-x64\librawspeed-full.node (
            echo Missing Windows prebuild at prebuilds\win32-x64\librawspeed-full.node
            exit /b 2
          )
          echo Windows prebuild verified successfully

      - name: Verify prebuild output (non-Windows)
        if: matrix.platform != 'win32'
        shell: bash
        run: |
          echo "Listing prebuilds directory"
          ls -R prebuilds || true

      - name: Install sharp runtime (for tests)
        run: npm i --no-save sharp

      - name: Run tests for platform
        run: npm test

      - name: Upload prebuild artifact
        uses: actions/upload-artifact@v4
        with:
          name: prebuild-${{ matrix.platform }}-${{ matrix.arch }}
          path: prebuilds/**
          retention-days: 30
          if-no-files-found: error

  release:
    runs-on: ubuntu-latest
    needs: build-prebuilds
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"

      - name: Clean existing prebuilds in workspace (before download)
        shell: bash
        run: |
          rm -rf prebuilds || true

      - name: Download all prebuild artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: prebuild-*
          path: prebuilds
          merge-multiple: true

      - name: Show prebuilds in workspace
        run: |
          echo "Workspace prebuilds tree:" &&
          if [ -d prebuilds ]; then ls -R prebuilds; else echo "no prebuilds dir"; fi
        shell: bash

      - name: Validate prebuild binaries (magic)
        shell: bash
        run: |
          set -e
          echo "Validating binary formats:"
          REQUIRED_PREBUILDS=(
            "prebuilds/linux-x64/librawspeed-full.node"
            "prebuilds/darwin-x64/librawspeed-full.node"
            "prebuilds/darwin-arm64/librawspeed-full.node"
            "prebuilds/win32-x64/librawspeed-full.node"
          )

          for prebuild in "${REQUIRED_PREBUILDS[@]}"; do
            if [ ! -f "$prebuild" ]; then
              echo "ERROR: missing $prebuild" >&2
              exit 1
            fi
          done

          # Windows must be PE/COFF (MZ)
          if [ ! -f prebuilds/win32-x64/librawspeed-full.node ]; then
            echo "ERROR: missing prebuilds/win32-x64/librawspeed-full.node" >&2
            exit 1
          fi
          # Linux must be ELF
          if hexdump -n 4 -e '4/1 "%02x"' prebuilds/linux-x64/librawspeed-full.node | grep -qi '^7f454c46$'; then
            echo "OK: linux-x64 is ELF"
          else
            echo "ERROR: linux-x64/librawspeed-full.node is not ELF" >&2
            file prebuilds/linux-x64/librawspeed-full.node || true
            exit 1
          fi
          # macOS x64 must be Mach-O
          if hexdump -n 4 -e '4/1 "%02x"' prebuilds/darwin-x64/librawspeed-full.node | grep -qi '^cffaedfe$'; then
            echo "OK: darwin-x64 is Mach-O"
          else
            echo "ERROR: darwin-x64/librawspeed-full.node is not Mach-O" >&2
            file prebuilds/darwin-x64/librawspeed-full.node || true
            exit 1
          fi
          if [ ! -f prebuilds/darwin-arm64/librawspeed-full.node ]; then
            echo "ERROR: missing prebuilds/darwin-arm64/librawspeed-full.node" >&2
            exit 1
          fi
          if hexdump -n 2 -e '2/1 "%02x"' prebuilds/win32-x64/librawspeed-full.node | grep -qi '^4d5a$'; then
            echo "OK: win32-x64 is PE/COFF"
          else
            echo "ERROR: win32-x64/librawspeed-full.node is not PE/COFF" >&2
            file prebuilds/win32-x64/librawspeed-full.node || true
            exit 1
          fi
          # macOS must be Mach-O (cffaedfe)
          if hexdump -n 4 -e '4/1 "%02x"' prebuilds/darwin-arm64/librawspeed-full.node | grep -qi '^cffaedfe$'; then
            echo "OK: darwin-arm64 is Mach-O"
          else
            echo "ERROR: darwin-arm64/librawspeed-full.node is not Mach-O" >&2
            file prebuilds/darwin-arm64/librawspeed-full.node || true
            exit 1
          fi

      - name: Install dependencies (no scripts)
        run: npm ci --ignore-scripts

      - name: Run packaging regression tests
        run: npm run test:packaging

      # Tests已在各平台构建作业跑过，这里跳过

      - name: Publish to npm
        run: npm publish --ignore-scripts
        env:
          NPM_CONFIG_IGNORE_SCRIPTS: "true"

      - name: Create GitHub Release
        id: create_release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ github.ref }}
          release_name: Release ${{ github.ref }}
          body: |
            ## 🎉 LibRaw Node.js 模块发布

            ### 📦 包含的预构建文件
            - Linux x64
            - macOS x64 (Intel)
            - macOS ARM64 (Apple Silicon)
            - Windows x64

            ### 🚀 安装
            ```bash
            npm install librawspeed-full
            ```

            ### 📋 变更日志
            请查看 [CHANGELOG.md](./CHANGELOG.md) 了解详细变更。
          draft: false
          prerelease: false

      - name: Upload Release Asset (macOS ARM64)
        if: ${{ always() && hashFiles('prebuilds/darwin-arm64/librawspeed-full.node') != '' }}
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: prebuilds/darwin-arm64/librawspeed-full.node
          asset_name: librawspeed-full-darwin-arm64.node
          asset_content_type: application/octet-stream

      - name: Upload Release Asset (macOS x64)
        if: ${{ always() && hashFiles('prebuilds/darwin-x64/librawspeed-full.node') != '' }}
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: prebuilds/darwin-x64/librawspeed-full.node
          asset_name: librawspeed-full-darwin-x64.node
          asset_content_type: application/octet-stream

      - name: Upload Release Asset (Linux x64)
        if: ${{ always() && hashFiles('prebuilds/linux-x64/librawspeed-full.node') != '' }}
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: prebuilds/linux-x64/librawspeed-full.node
          asset_name: librawspeed-full-linux-x64.node
          asset_content_type: application/octet-stream

      - name: Upload Release Asset (Windows x64)
        if: ${{ always() && hashFiles('prebuilds/win32-x64/librawspeed-full.node') != '' }}
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: prebuilds/win32-x64/librawspeed-full.node
          asset_name: librawspeed-full-win32-x64.node
          asset_content_type: application/octet-stream
