name: Build and Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build-prebuilds:
    strategy:
      max-parallel: 3 # 最多同时运行3个平台，避免资源竞争
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux
            arch: x64
            runner: ubuntu-latest
            runner-type: ubuntu-22.04
            cores: 10
            memory: 32
          - os: ubuntu-latest
            platform: linux
            arch: arm64
            runner: ubuntu-latest
            runner-type: ubuntu-22.04
            cores: 10
            memory: 32
          - os: macos-latest
            platform: darwin
            arch: x64
            runner: macos-latest
            runner-type: macos-13
            cores: 10
            memory: 32
          - os: macos-latest
            platform: darwin
            arch: arm64
            runner: macos-latest
            runner-type: macos-13
            cores: 10
            memory: 32
          - os: windows-latest
            platform: win32
            arch: x64
            runner: windows-latest
            runner-type: windows-2022
            cores: 10
            memory: 32

    runs-on: ${{ matrix.runner }}
    timeout-minutes: 120

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Display hardware specifications
        run: |
          echo "🖥️  固定硬件规格配置:"
          echo "=================="
          echo "操作系统: $(uname -s)"
          echo "架构: $(uname -m)"
          echo "内核版本: $(uname -r)"
          echo "配置类型: 高性能构建环境"
          echo "CPU 核心数: ${{ matrix.cores }} (固定配置)"
          echo "内存大小: ${{ matrix.memory }}GB (固定配置)"
          echo "并行任务数: 8 (为系统保留 2 核心)"
          echo "Runner 类型: ${{ matrix.runner-type }}"
          echo "=================="
          echo "实际系统信息:"
          echo "检测到的 CPU 核心: $(nproc 2>/dev/null || sysctl -n hw.ncpu 2>/dev/null || echo 'N/A')"
          echo "检测到的内存:"
          if command -v free >/dev/null 2>&1; then
            free -h
          elif command -v vm_stat >/dev/null 2>&1; then
            vm_stat
          else
            echo "无法获取内存信息"
          fi
          echo "磁盘空间:"
          df -h
          echo "=================="

      - name: Install build tools (Linux)
        if: matrix.platform == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y autoconf automake libtool build-essential pkg-config

      - name: Install build tools (macOS)
        if: matrix.platform == 'darwin'
        run: |
          brew install autoconf automake libtool pkg-config
          # 修复 libtool 路径问题
          echo "export PATH=\"/opt/homebrew/opt/libtool/libexec/gnubin:\$PATH\"" >> $GITHUB_ENV

      - name: Install build tools (Windows)
        if: matrix.platform == 'win32'
        run: |
          echo "Using pre-installed MSVC tools"

      - name: Download LibRaw dependencies
        run: bash scripts/download-dependencies.sh

      - name: Build LibRaw
        run: |
          echo "🚀 开始构建 LibRaw..."
          echo "⏰ 构建开始时间: $(date)"
          echo "📊 构建配置: 动态并行任务，基于实际硬件规格"
          echo "🔄 构建过程可能需要5-10分钟，请耐心等待..."
          bash scripts/build-libraw.sh
          echo "✅ LibRaw 构建完成"
          echo "⏰ 构建结束时间: $(date)"
          echo "📁 检查构建结果..."
          ls -la deps/LibRaw-Source/LibRaw-*/build/*/

      - name: Generate prebuild for current platform
        run: npm run prebuildify
        env:
          PREBUILD_PLATFORM: ${{ matrix.platform }}
          PREBUILD_ARCH: ${{ matrix.arch }}

      - name: Upload prebuild artifact
        uses: actions/upload-artifact@v4
        with:
          name: prebuild-${{ matrix.platform }}-${{ matrix.arch }}
          path: prebuilds/
          retention-days: 30

  collect-prebuilds:
    runs-on: ubuntu-latest
    needs: build-prebuilds
    if: always()

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download all prebuild artifacts
        uses: actions/download-artifact@v4
        with:
          path: prebuilds/

      - name: Merge prebuilds
        run: |
          echo "🔗 合并所有平台的预构建文件..."

          # 创建统一的 prebuilds 目录
          mkdir -p prebuilds-unified

          # 合并所有平台的预构建文件
          for dir in prebuilds-*/prebuilds/*; do
            if [ -d "$dir" ]; then
              platform_arch=$(basename "$dir")
              echo "📁 处理平台: $platform_arch"
              cp -r "$dir" "prebuilds-unified/"
            fi
          done

          # 显示最终结构
          echo "📊 最终预构建文件结构:"
          find prebuilds-unified -name "*.node" -type f | sort

          # 统计信息
          echo "📈 统计信息:"
          echo "总文件数: $(find prebuilds-unified -name "*.node" -type f | wc -l)"
          echo "总大小: $(du -sh prebuilds-unified/ | cut -f1)"

      - name: Upload unified prebuilds
        uses: actions/upload-artifact@v4
        with:
          name: prebuilds-all-platforms
          path: prebuilds-unified/
          retention-days: 30

  release:
    runs-on: ubuntu-latest
    needs: collect-prebuilds
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"

      - name: Download prebuilds
        uses: actions/download-artifact@v4
        with:
          name: prebuilds-all-platforms
          path: prebuilds/

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Publish to npm
        run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Create GitHub Release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ github.ref }}
          release_name: Release ${{ github.ref }}
          body: |
            ## 🎉 LibRaw Node.js 模块发布

            ### 📦 包含的预构建文件
            - Linux x64
            - Linux ARM64
            - macOS x64
            - macOS ARM64
            - Windows x64

            ### 🚀 安装
            ```bash
            npm install librawspeed
            ```

            ### 📋 变更日志
            请查看 [CHANGELOG.md](./CHANGELOG.md) 了解详细变更。
          draft: false
          prerelease: false
