name: Build and Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build-prebuilds:
    strategy:
      max-parallel: 2 # 最多同时运行2个平台，避免资源竞争
      fail-fast: false # 不因为一个作业失败而取消其他作业
      matrix:
        include:
          - os: macos-latest
            platform: darwin
            arch: arm64
            runner: macos-latest
            runner-type: macos-14
            cores: 10
            memory: 32
          - os: windows-latest
            platform: win32
            arch: x64
            runner: windows-latest
            runner-type: windows-2022
            cores: 10
            memory: 32

    runs-on: ${{ matrix.runner }}
    timeout-minutes: 120

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Display hardware specifications
        shell: bash
        run: |
          echo "🖥️  固定硬件规格配置:"
          echo "=================="
          echo "操作系统: $(uname -s)"
          echo "架构: $(uname -m)"
          echo "内核版本: $(uname -r)"
          echo "配置类型: 高性能构建环境"
          echo "CPU 核心数: ${{ matrix.cores }} (固定配置)"
          echo "内存大小: ${{ matrix.memory }}GB (固定配置)"
          echo "并行任务数: 8 (为系统保留 2 核心)"
          echo "Runner 类型: ${{ matrix.runner-type }}"
          echo "=================="
          echo "实际系统信息:"
          echo "检测到的 CPU 核心: $(nproc 2>/dev/null || sysctl -n hw.ncpu 2>/dev/null || echo 'N/A')"
          echo "检测到的内存:"
          if command -v free >/dev/null 2>&1; then
            free -h
          elif command -v vm_stat >/dev/null 2>&1; then
            vm_stat
          else
            echo "无法获取内存信息"
          fi
          echo "磁盘空间:"
          df -h
          echo "=================="

      - name: Install build tools (Linux)
        if: matrix.platform == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y autoconf automake libtool build-essential pkg-config

      - name: Install build tools (macOS)
        if: matrix.platform == 'darwin'
        run: |
          echo "🍎 安装 macOS 构建工具..."
          brew install autoconf automake libtool pkg-config
          echo "export PATH=\"/opt/homebrew/opt/libtool/bin:$PATH\"" >> $GITHUB_ENV
          echo "🔍 检查构建工具状态:"
          which autoconf automake libtool pkg-config

      - name: Install build tools (Windows)
        if: matrix.platform == 'win32'
        shell: cmd
        run: |
          echo 🪟 验证 Windows 构建环境...
          call "C:\Program Files\Microsoft Visual Studio\2022\Enterprise\Common7\Tools\VsDevCmd.bat" -arch=amd64 -host_arch=amd64
          echo ✅ 已加载 VS 开发者命令环境
          where cl
          cl /?
          where nmake
          where cmake

      - name: Setup MSVC (Windows)
        if: matrix.platform == 'win32'
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Download LibRaw dependencies
        run: bash scripts/download-dependencies.sh

      - name: Build LibRaw
        run: |
          echo "🚀 开始构建 LibRaw..."
          echo "⏰ 构建开始时间: $(date)"
          echo "📊 构建配置: 动态并行任务，基于实际硬件规格"
          echo "🔄 构建过程可能需要5-10分钟，请耐心等待..."
          bash scripts/build-libraw.sh
          echo "✅ LibRaw 构建完成"
          echo "⏰ 构建结束时间: $(date)"
          echo "📁 检查构建结果..."
          if [ "${{ matrix.platform }}" = "win32" ]; then
            echo "🪟 Windows 构建调试信息:"
            echo "  检查 LibRaw 源码目录:"
            ls -la deps/LibRaw-Source/LibRaw-*/
            echo "  检查构建目录结构:"
            find deps/LibRaw-Source/LibRaw-*/build -type f -name "*.lib" -o -name "*.a" -o -name "*.dll" | head -20
          else
            ls -la deps/LibRaw-Source/LibRaw-*/build/*/
          fi

      - name: Generate prebuild for current platform
        run: npm run prebuildify
        env:
          PREBUILD_PLATFORM: ${{ matrix.platform }}
          PREBUILD_ARCH: ${{ matrix.arch }}

      - name: Upload prebuild artifact
        uses: actions/upload-artifact@v4
        with:
          name: prebuild-${{ matrix.platform }}-${{ matrix.arch }}
          path: prebuilds/
          retention-days: 30

  collect-prebuilds:
    runs-on: ubuntu-latest
    needs: build-prebuilds
    if: always()

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download all prebuild artifacts
        uses: actions/download-artifact@v4
        with:
          path: prebuilds/

      - name: Merge prebuilds
        run: |
          echo "🔗 合并所有平台的预构建文件..."
          mkdir -p prebuilds/all-platforms
          find prebuilds -mindepth 2 -name "*.node" -exec cp -v {} prebuilds/all-platforms/ \;
          echo "📊 最终预构建文件结构:"
          ls -R prebuilds/all-platforms

      - name: Upload unified prebuilds
        uses: actions/upload-artifact@v4
        with:
          name: prebuilds-all-platforms
          path: prebuilds/all-platforms/
          retention-days: 30

  release:
    runs-on: ubuntu-latest
    needs: collect-prebuilds
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"

      - name: Download prebuilds
        uses: actions/download-artifact@v4
        with:
          name: prebuilds-all-platforms
          path: prebuilds/all-platforms/

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Publish to npm
        run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Create GitHub Release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ github.ref }}
          release_name: Release ${{ github.ref }}
          body: |
            ## 🎉 LibRaw Node.js 模块发布

            ### 📦 包含的预构建文件
            - macOS ARM64 (Apple Silicon)
            - Windows x64

            ### 🚀 安装
            ```bash
            npm install librawspeed
            ```

            ### 📋 变更日志
            请查看 [CHANGELOG.md](./CHANGELOG.md) 了解详细变更。
          draft: false
          prerelease: false
