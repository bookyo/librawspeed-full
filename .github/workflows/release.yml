name: Build and Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-prebuilds:
    strategy:
      max-parallel: 2 # 最多同时运行2个平台，避免资源竞争
      fail-fast: false # 不因为一个作业失败而取消其他作业
      matrix:
        include:
          - os: macos-latest
            platform: darwin
            arch: arm64
            runner: macos-latest
            runner-type: macos-14
            cores: 10
            memory: 32
          - os: windows-latest
            platform: win32
            arch: x64
            runner: windows-latest
            runner-type: windows-2022
            cores: 10
            memory: 32

    runs-on: ${{ matrix.runner }}
    timeout-minutes: 120

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Display hardware specifications
        shell: bash
        run: |
          echo "🖥️  固定硬件规格配置:"
          echo "=================="
          echo "操作系统: $(uname -s)"
          echo "架构: $(uname -m)"
          echo "内核版本: $(uname -r)"
          echo "配置类型: 高性能构建环境"
          echo "CPU 核心数: ${{ matrix.cores }} (固定配置)"
          echo "内存大小: ${{ matrix.memory }}GB (固定配置)"
          echo "并行任务数: 8 (为系统保留 2 核心)"
          echo "Runner 类型: ${{ matrix.runner-type }}"
          echo "=================="
          echo "实际系统信息:"
          echo "检测到的 CPU 核心: $(nproc 2>/dev/null || sysctl -n hw.ncpu 2>/dev/null || echo 'N/A')"
          echo "检测到的内存:"
          if command -v free >/dev/null 2>&1; then
            free -h
          elif command -v vm_stat >/dev/null 2>&1; then
            vm_stat
          else
            echo "无法获取内存信息"
          fi
          echo "磁盘空间:"
          df -h
          echo "=================="

      - name: Install build tools (Linux)
        if: matrix.platform == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y autoconf automake libtool build-essential pkg-config

      - name: Install build tools (macOS)
        if: matrix.platform == 'darwin'
        run: |
          echo "🍎 安装 macOS 构建工具..."
          brew install autoconf automake libtool pkg-config
          echo "export PATH=\"/opt/homebrew/opt/libtool/bin:$PATH\"" >> $GITHUB_ENV
          echo "🔍 检查构建工具状态:"
          which autoconf automake libtool pkg-config

      - name: Install build tools (Windows)
        if: matrix.platform == 'win32'
        shell: cmd
        run: |
          echo 🪟 验证 Windows 构建环境...
          call "C:\Program Files\Microsoft Visual Studio\2022\Enterprise\Common7\Tools\VsDevCmd.bat" -arch=amd64 -host_arch=amd64
          echo ✅ 已加载 VS 开发者命令环境
          where cl
          cl /?
          where nmake
          where cmake

      - name: Setup MSVC (Windows)
        if: matrix.platform == 'win32'
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Download LibRaw dependencies
        shell: bash
        run: bash scripts/download-dependencies.sh

      - name: Build LibRaw (Windows)
        if: matrix.platform == 'win32'
        shell: cmd
        run: |
          echo Starting LibRaw MSVC build
          cd deps\LibRaw-Source\LibRaw-0.21.4
          call "C:\Program Files\Microsoft Visual Studio\2022\Enterprise\Common7\Tools\VsDevCmd.bat" -arch=amd64 -host_arch=amd64
          where cl
          where nmake
          if not exist lib mkdir lib
          if not exist object mkdir object
          if not exist bin mkdir bin
          nmake /nologo /f Makefile.msvc clean
          nmake /nologo /f Makefile.msvc lib\libraw_static.lib
          if not exist lib\libraw_static.lib (
            echo libraw_static.lib not found
            exit /b 2
          )
          mkdir build\windows-x64\lib
          copy /y lib\libraw_static.lib build\windows-x64\lib\
          dir build\windows-x64\lib

      - name: Build LibRaw (non-Windows)
        if: matrix.platform != 'win32'
        shell: bash
        run: |
          echo "🚀 开始构建 LibRaw..."
          echo "⏰ 构建开始时间: $(date)"
          echo "📊 构建配置: 动态并行任务，基于实际硬件规格"
          echo "🔄 构建过程可能需要5-10分钟，请耐心等待..."
          bash scripts/build-libraw.sh
          echo "✅ LibRaw 构建完成"
          echo "⏰ 构建结束时间: $(date)"
          echo "📁 检查构建结果..."
          ls -la deps/LibRaw-Source/LibRaw-*/build/*/

      - name: Generate prebuild (Windows)
        if: matrix.platform == 'win32'
        shell: cmd
        run: |
          npx prebuildify --napi --platform win32 --arch x64

      - name: Generate prebuild (macOS)
        if: matrix.platform == 'darwin'
        shell: bash
        run: |
          npx prebuildify --napi --platform darwin --arch ${{ matrix.arch }}

      - name: Generate prebuild (Linux)
        if: matrix.platform == 'linux'
        shell: bash
        run: |
          npx prebuildify --napi --platform linux --arch x64

      - name: Verify prebuild output
        if: matrix.platform == 'win32'
        shell: cmd
        run: |
          echo Verifying Windows prebuild exists
          dir prebuilds\
          if not exist prebuilds\win32-x64\librawspeed.node (
            echo Missing Windows prebuild at prebuilds\win32-x64\librawspeed.node
            exit /b 2
          )
          echo Windows prebuild verified successfully

      - name: Verify prebuild output (non-Windows)
        if: matrix.platform != 'win32'
        shell: bash
        run: |
          echo "Listing prebuilds directory"
          ls -R prebuilds || true

      - name: Install sharp runtime (for tests)
        run: npm i --no-save sharp

      - name: Run tests for platform
        run: npm test

      - name: Upload prebuild artifact
        uses: actions/upload-artifact@v4
        with:
          name: prebuild-${{ matrix.platform }}-${{ matrix.arch }}
          path: prebuilds/**
          retention-days: 30
          if-no-files-found: error

  release:
    runs-on: ubuntu-latest
    needs: build-prebuilds
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"

      - name: Clean existing prebuilds in workspace (before download)
        shell: bash
        run: |
          rm -rf prebuilds || true

      - name: Download all prebuild artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: prebuild-*
          path: prebuilds
          merge-multiple: true

      - name: Show prebuilds in workspace
        run: |
          echo "Workspace prebuilds tree:" &&
          if [ -d prebuilds ]; then ls -R prebuilds; else echo "no prebuilds dir"; fi
        shell: bash

      - name: Validate prebuild binaries (magic)
        shell: bash
        run: |
          set -e
          echo "Validating binary formats:"
          if [ -f prebuilds/win32-x64/librawspeed.node ]; then
            # Expect PE/COFF (starts with MZ)
            if hexdump -n 2 -e '2/1 "%02x"' prebuilds/win32-x64/librawspeed.node | grep -qi '^4d5a$'; then
              echo "OK: win32-x64 is PE/COFF"
            else
              echo "ERROR: win32-x64/librawspeed.node is not PE/COFF (likely wrong platform)" >&2
              file prebuilds/win32-x64/librawspeed.node || true
              exit 1
            fi
          fi
          if [ -f prebuilds/darwin-arm64/librawspeed.node ]; then
            # Expect Mach-O (starts with cffaedfe)
            if hexdump -n 4 -e '4/1 "%02x"' prebuilds/darwin-arm64/librawspeed.node | grep -qi '^cffaedfe$'; then
              echo "OK: darwin-arm64 is Mach-O"
            else
              echo "ERROR: darwin-arm64/librawspeed.node is not Mach-O" >&2
              file prebuilds/darwin-arm64/librawspeed.node || true
              exit 1
            fi
          fi
          # Require at least one platform present
          if [ ! -f prebuilds/win32-x64/librawspeed.node ] && [ ! -f prebuilds/darwin-arm64/librawspeed.node ]; then
            echo "ERROR: no prebuilds found under prebuilds/" >&2
            ls -R prebuilds || true
            exit 1
          fi

      - name: Install dependencies (no scripts)
        run: npm ci --ignore-scripts

      # Tests已在各平台构建作业跑过，这里跳过

      - name: Publish to npm
        run: npm publish --ignore-scripts
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_CONFIG_IGNORE_SCRIPTS: "true"

      - name: Create GitHub Release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ github.ref }}
          release_name: Release ${{ github.ref }}
          body: |
            ## 🎉 LibRaw Node.js 模块发布

            ### 📦 包含的预构建文件
            - macOS ARM64 (Apple Silicon)
            - Windows x64

            ### 🚀 安装
            ```bash
            npm install librawspeed
            ```

            ### 📋 变更日志
            请查看 [CHANGELOG.md](./CHANGELOG.md) 了解详细变更。
          draft: false
          prerelease: false
