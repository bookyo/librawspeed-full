name: Release with Prebuilds

on:
    push:
        tags:
            - "v*"
    workflow_dispatch:

jobs:
    release:
        runs-on: ubuntu-latest
        needs: build-prebuilds
        timeout-minutes: 10

        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: "22"
                  registry-url: "https://registry.npmjs.org"

            - name: Download prebuilds
              uses: actions/download-artifact@v4
              with:
                  name: prebuilds-all-platforms
                  path: prebuilds/

            - name: Install dependencies
              run: npm ci

            - name: Run tests
              run: npm test

            - name: Publish to npm
              run: npm publish
              env:
                  NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

            - name: Create GitHub Release
              uses: actions/create-release@v1
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
              with:
                  tag_name: ${{ github.ref }}
                  release_name: Release ${{ github.ref }}
                  body: |
                      ## 🎉 LibRaw Node.js 模块发布

                      ### 📦 包含的预构建文件
                      - Linux x64
                      - Linux ARM64
                      - macOS x64
                      - macOS ARM64
                      - Windows x64

                      ### 🚀 安装
                      ```bash
                      npm install librawspeed
                      ```

                      ### 📋 变更日志
                      请查看 [CHANGELOG.md](./CHANGELOG.md) 了解详细变更。
                  draft: false
                  prerelease: false
